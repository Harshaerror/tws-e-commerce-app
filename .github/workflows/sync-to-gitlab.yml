# .github/workflows/sync-to-gitlab.yml

name: Sync to GitLab

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_PAT }}@gitlab.com/harshaerror/tws-e-commerce-app.git
          git push gitlab master --force